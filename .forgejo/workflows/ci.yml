name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: plancop-runner
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - uses: https://code.forgejo.org/actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: cd ui && npm ci
      - run: npm run build
      - run: npm run test:coverage
